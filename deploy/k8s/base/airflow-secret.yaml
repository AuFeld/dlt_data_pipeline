# Airflow + pipeline credentials. PLACEHOLDER VALUES ONLY — every entry MUST
# be overridden per env (sealed-secrets / SOPS / external secrets controller /
# overlay patches). DO NOT COMMIT real credentials.
#
# Env-var keys mirror `.env.example` so the same `connection:` names in
# pipeline YAML resolve identically on host, in compose, and in-cluster.
#
# NOTE re destination env-var shape: `DESTINATION__<CONN>__CREDENTIALS` is
# the WORKING form dlt actually reads (the destination is built with
# `destination_name=connection`, so no `<TYPE>` segment). The
# `DESTINATION__<TYPE>__<CONN>__CREDENTIALS` form advertised by
# destinations/_metadata.py is the bug Segment 12 owns — see the existing
# guard comment at .github/workflows/ci.yml around the integration-postgres
# job. Do not "correct" the keys here; Segment 12 will flip the metadata.
apiVersion: v1
kind: Secret
metadata:
  name: airflow-secrets
  namespace: airflow
type: Opaque
stringData:
  # --- Airflow core ---
  # Generate per env: `python -c "from cryptography.fernet import Fernet;
  # print(Fernet.generate_key().decode())"`
  AIRFLOW__CORE__FERNET_KEY: "REPLACE_ME_FERNET"
  # Airflow 2 reads either SQL_ALCHEMY_CONN key; ship both for forward-compat.
  AIRFLOW__CORE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://airflow:REPLACE_ME@postgres-metadata:5432/airflow"
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://airflow:REPLACE_ME@postgres-metadata:5432/airflow"
  AIRFLOW__WEBSERVER__SECRET_KEY: "REPLACE_ME_WEBSERVER_SECRET"

  # --- S3 remote logging (v1 — IRSA is v2, doc-only) ---
  AWS_ACCESS_KEY_ID: "REPLACE_ME"
  AWS_SECRET_ACCESS_KEY: "REPLACE_ME"
  AWS_DEFAULT_REGION: "us-east-1"

  # --- Pipeline source credentials (per .env.example) ---
  SOURCES__SQL_DATABASE__PG_SOURCE__CREDENTIALS: "postgresql://source:REPLACE_ME@source-host:5432/source_db"
  SOURCES__PG_CDC__PG_SOURCE__CREDENTIALS: "postgresql://replicator:REPLACE_ME@source-host:5432/source_db"

  # --- Pipeline destination credentials (working form, see note above) ---
  DESTINATION__PG_WAREHOUSE__CREDENTIALS: "postgresql://warehouse:REPLACE_ME@warehouse-host:5432/warehouse_db"
  DESTINATION__SNOWFLAKE__CREDENTIALS__HOST: "REPLACE_ME.snowflakecomputing.com"
  DESTINATION__SNOWFLAKE__CREDENTIALS__USERNAME: "REPLACE_ME"
  DESTINATION__SNOWFLAKE__CREDENTIALS__PASSWORD: "REPLACE_ME"
  DESTINATION__SNOWFLAKE__CREDENTIALS__DATABASE: "REPLACE_ME"
  DESTINATION__SNOWFLAKE__CREDENTIALS__WAREHOUSE: "REPLACE_ME"
  DESTINATION__SNOWFLAKE__CREDENTIALS__ROLE: "REPLACE_ME"
