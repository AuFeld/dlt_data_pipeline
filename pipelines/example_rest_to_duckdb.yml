# yaml-language-server: $schema=./_schema.json
name: example_rest_to_duckdb
source:
  type: rest_api
  connection: public_demo_api
  config:
    base_url: https://pokeapi.co/api/v2/
    endpoints:
      - pokemon
sync:
  mode: full_refresh
destination:
  type: duckdb
  connection: local_duckdb
  dataset: raw_demo
schedule:
  cron: "0 6 * * *"
  enabled: true
options:
  write_disposition: replace
  schema_contract: evolve
