# Minimal Airflow config for local dev (Segment 4).
#
# Executor progression (single-line swap at each step):
#   Segment 4 (now): SequentialExecutor — works with the default sqlite
#     metastore that ships with `airflow standalone`. Single task at a time.
#   Segment 6: LocalExecutor — once docker-compose brings up
#     `postgres-airflow`, point sql_alchemy_conn at it and flip executor.
#     LocalExecutor refuses sqlite (concurrent writes), so the metastore
#     swap must land first.
#   Segment 10: KubernetesExecutor — also add
#     [kubernetes_executor]
#     pod_template_file = {AIRFLOW_HOME}/pod_templates/base.yaml
#
# DAG code, pipeline factory, and YAML schema are unchanged at every swap.
# The per-task ``executor_config={"pod_override": V1Pod(...)}`` wired in
# dag_factory.py is ignored by Sequential/Local and honored by Kubernetes.

[core]
executor = SequentialExecutor
dags_folder = {AIRFLOW_HOME}/../dags
load_examples = False
parallelism = 16
default_timezone = utc

[scheduler]
min_file_process_interval = 30

[webserver]
expose_config = False

[logging]
base_log_folder = {AIRFLOW_HOME}/logs

[metrics]
# Opt in to Airflow 3's default (timers/timings in milliseconds). Silences the
# RemovedInAirflow3Warning spam from scheduler + triggerer on Airflow 2.10+.
timer_unit_consistency = True
