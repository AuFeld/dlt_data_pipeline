name: beta
source:
  type: sql_database
  connection: pg_source
  config:
    schema: public
    tables: [orders]
sync:
  mode: incremental
  cursor_field: updated_at
  primary_key: id
destination:
  type: postgres
  connection: pg_warehouse
  dataset: raw_beta
schedule:
  cron: "*/15 * * * *"
options:
  write_disposition: merge
