repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        # k8s manifests under deploy/k8s/ are multi-document (Service +
        # Deployment + RBAC in one file is idiomatic). Allow `---`
        # separators repo-wide; single-doc files are still valid input.
        args: ["--allow-multiple-documents"]
        # Fixture YAMLs are intentionally malformed to exercise the loader's
        # error paths — skip them here.
        exclude: |
          (?x)^(
            tests/fixtures/pipelines_invalid/.*\.yml|
            tests/fixtures/pipelines_valid/_.*\.yml
          )$
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.9
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: local
    hooks:
      - id: regen-pipeline-schema
        name: pipelines/_schema.json matches pydantic models
        entry: uv run python -m dlt_data_pipeline config schema --check
        language: system
        pass_filenames: false
        files: ^(src/dlt_data_pipeline/config/models\.py|pipelines/_schema\.json)$
