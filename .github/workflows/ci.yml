name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  AIRFLOW_VERSION: "2.10.3"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-uv-airflow
        with:
          airflow-version: "2.10.3"
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy
      - run: uv run pre-commit run regen-pipeline-schema --all-files

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-uv-airflow
        with:
          airflow-version: "2.10.3"
      - run: uv run pytest tests/unit

  integration-duckdb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-uv-airflow
        with:
          airflow-version: "2.10.3"
      - run: uv run pytest tests/integration -m "not postgres and not cdc and not snowflake"

  integration-postgres:
    runs-on: ubuntu-latest
    services:
      postgres-source:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: source
          POSTGRES_PASSWORD: source
          POSTGRES_DB: source_db
        ports: ["5433:5432"]
        options: >-
          --health-cmd "pg_isready -U source"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      postgres-destination:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: warehouse
          POSTGRES_PASSWORD: warehouse
          POSTGRES_DB: warehouse_db
        ports: ["5434:5432"]
        options: >-
          --health-cmd "pg_isready -U warehouse"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      SOURCES__SQL_DATABASE__PG_SOURCE__CREDENTIALS: postgresql://source:source@localhost:5433/source_db
      DESTINATION__PG_WAREHOUSE__CREDENTIALS: postgresql://warehouse:warehouse@localhost:5434/warehouse_db
      RUN_LIVE_PG: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-uv-airflow
        with:
          airflow-version: "2.10.3"
      - name: install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: seed source DB
        run: |
          PGPASSWORD=source psql -h localhost -p 5433 -U source -d source_db \
            -v ON_ERROR_STOP=1 -f scripts/seed_source.sql
      - name: non-cdc postgres integration tests
        run: uv run pytest tests/integration -m "postgres and not cdc"

  integration-cdc:
    # Separate job from integration-postgres because GHA `services:` postgres
    # cannot set wal_level=logical (no custom `command:` support), and the
    # services already bind host port 5433 — bringing up docker compose
    # postgres-source in the same job hits a port conflict. Compose-only here.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-uv-airflow
        with:
          airflow-version: "2.10.3"
      - name: docker compose postgres-source + postgres-destination
        run: |
          docker compose -f docker/docker-compose.yml up -d postgres-source postgres-destination
          for i in {1..30}; do
            if docker compose -f docker/docker-compose.yml exec -T postgres-source \
              pg_isready -U source >/dev/null 2>&1; then
              echo "postgres-source ready"; break
            fi
            sleep 2
          done
      - name: cdc integration tests
        env:
          SOURCES__PG_CDC__PG_SOURCE__CREDENTIALS: postgresql://source:source@localhost:5433/source_db
          DESTINATION__PG_WAREHOUSE__CREDENTIALS: postgresql://warehouse:warehouse@localhost:5434/warehouse_db
          RUN_LIVE_PG_CDC: "1"
        run: uv run pytest tests/integration -m cdc

  integration-snowflake:
    # GitHub Actions disallows `secrets` in job-level `if:`. The pytest
    # `skipif(not SNOWFLAKE_TEST_ACCOUNT)` in tests/integration/test_destinations_snowflake.py
    # is the actual gate — the job runs, installs deps, and skips the single
    # test cleanly when secrets are absent. CI stays green either way.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-uv-airflow
        with:
          airflow-version: "2.10.3"
          extras: "snowflake"
      - run: uv run pytest tests/integration -m snowflake
        env:
          SNOWFLAKE_TEST_ACCOUNT: ${{ secrets.SNOWFLAKE_TEST_ACCOUNT }}
          SNOWFLAKE_TEST_USER: ${{ secrets.SNOWFLAKE_TEST_USER }}
          SNOWFLAKE_TEST_PASSWORD: ${{ secrets.SNOWFLAKE_TEST_PASSWORD }}
          SNOWFLAKE_TEST_DATABASE: ${{ secrets.SNOWFLAKE_TEST_DATABASE }}
          SNOWFLAKE_TEST_WAREHOUSE: ${{ secrets.SNOWFLAKE_TEST_WAREHOUSE }}
          SNOWFLAKE_TEST_ROLE: ${{ secrets.SNOWFLAKE_TEST_ROLE }}

  build-and-push:
    # Builds the `prod` Dockerfile target and pushes to GHCR. Runs on main
    # pushes (rolling :sha-<long> tag) and on v* tag pushes (adds :v<tag> +
    # :latest). Skipped on PRs.
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs: [lint, unit, integration-duckdb, integration-postgres]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/dlt-data-pipeline
          tags: |
            type=sha,format=long
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    # Rolls the new image into the cluster. Tag pushes only (Segment 10
    # decision — safer for prod hardening period). Cluster auth is a
    # placeholder; swap for the cluster's actual auth model. Job is wired
    # `if: false` until the AWS_DEPLOY_ROLE_ARN / EKS_CLUSTER secrets are
    # provisioned — flip on by removing the explicit false.
    if: false  # set to: startsWith(github.ref, 'refs/tags/v') once cluster auth is provisioned
    needs: [build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/dlt-data-pipeline
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: kubeconfig
        run: aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER }}
      - name: sync pod-template ConfigMap from repo source of truth
        run: |
          kubectl -n airflow create configmap airflow-pod-template \
            --from-file=base.yaml=deploy/k8s/base/pod-template-base.yaml \
            --dry-run=client -o yaml | kubectl apply -f -
      - name: patch worker container tag so scheduler spawns new image
        run: |
          SHORT_SHA=${GITHUB_SHA:0:12}
          kubectl -n airflow set env configmap/airflow-config \
            AIRFLOW__KUBERNETES_EXECUTOR__WORKER_CONTAINER_TAG=sha-${SHORT_SHA}
      - name: roll airflow components
        run: |
          IMAGE="${IMAGE_REPO}@${{ needs.build-and-push.outputs.digest }}"
          for c in webserver scheduler triggerer; do
            kubectl -n airflow set image deployment/airflow-$c $c=$IMAGE
          done
          for c in webserver scheduler triggerer; do
            kubectl -n airflow rollout status deployment/airflow-$c --timeout=5m
          done
